services:
  mongo:
    image: mongo:8
    container_name: futures-ctp
    restart: always
    ports:
      - "10001:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: 123456
    volumes:
      - futures-ctp:/data/db

volumes:
  futures-ctp:
    name: 'mongo--futures-ctp'
